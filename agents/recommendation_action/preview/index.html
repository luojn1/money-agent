<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>看得懂的钱 · 合同体检</title>
<style>
  /* 视觉沿用 B 结果页设计语言：暖灰底 / 深绿主色 / 编号分区卡片 / 红黄绿等级 */
  :root {
    --bg:#f4f5f0; --card:#fff; --line:#e6e7e0; --ink:#20241f; --sub:#6f766e;
    --green:#22423a; --green-mid:#2e5a4c; --green-soft:#e8efe9;
    --red-bg:#fbe9e7; --red:#b3341f; --yellow-bg:#fdf3d8; --yellow:#8a6116;
    --ok-bg:#e6f2ea; --ok:#1f7a4d;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); }
  .wrap { max-width:1080px; margin:0 auto; padding:20px 28px 60px; }
  .topbar { display:flex; align-items:center; gap:10px; padding:8px 0 18px; }
  .logo { width:34px; height:34px; border-radius:9px; background:var(--green);
          color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .topbar b { font-size:17px; }
  .topbar .tag { margin-left:auto; font-size:13px; color:var(--ok); }
  .back { color:var(--sub); font-size:14px; cursor:pointer; margin-bottom:14px; display:none; }
  .back:hover { color:var(--ink); }

  button { border:1px solid var(--line); background:var(--card); padding:10px 18px;
           border-radius:10px; cursor:pointer; font-size:14.5px; color:var(--ink); }
  button.primary { background:var(--green); color:#fff; border-color:var(--green); }
  button:hover { filter:brightness(.96); }

  .hero { background:var(--green); color:#fff; border-radius:18px; padding:32px 36px;
          display:flex; gap:24px; align-items:center; }
  .hero .kicker { color:#cfe0c9; font-size:13px; letter-spacing:2px; margin-bottom:8px; }
  .hero h1 { margin:0 0 10px; font-size:36px; letter-spacing:2px; }
  .hero p { margin:0; font-size:14.5px; line-height:1.8; color:#e8efe4; max-width:640px; }
  .hero .side { margin-left:auto; background:rgba(255,255,255,.08);
                border:1px solid rgba(255,255,255,.18); border-radius:14px;
                padding:18px 26px; min-width:150px; }
  .hero .side .lab { font-size:13px; color:#cfe0c9; }
  .hero .side .val { font-size:30px; font-weight:700; margin:4px 0; }
  .hero .side .sub { font-size:13px; color:#cfe0c9; }

  .section { background:var(--card); border:1px solid var(--line); border-radius:18px;
             padding:24px 28px; margin-top:18px; }
  .sec-head { display:flex; align-items:baseline; gap:14px; }
  .sec-no { background:var(--green-soft); color:var(--green); font-size:13px;
            font-weight:700; padding:6px 10px; border-radius:9px; }
  .sec-head h2 { font-size:19px; margin:0; }
  .sec-desc { color:var(--sub); font-size:13.5px; margin:4px 0 16px 52px; }

  .chip { display:inline-block; font-size:12px; padding:3px 12px; border-radius:999px; font-weight:600; }
  .c-red{background:var(--red-bg);color:var(--red);} .c-yellow{background:var(--yellow-bg);color:var(--yellow);}
  .c-green{background:var(--ok-bg);color:var(--ok);} .c-gray{background:#eef0ea;color:var(--sub);font-weight:400;}

  /* 首页/上传 */
  .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px; }
  .opt { border:1px dashed var(--line); border-radius:14px; padding:18px; }
  .opt h3 { margin:0 0 6px; font-size:15.5px; }
  .opt p { margin:0 0 12px; font-size:13px; color:var(--sub); line-height:1.7; }
  .opt input[type=file] { font-size:13px; margin-bottom:8px; display:block; }
  .profile { margin-top:16px; font-size:13.5px; color:var(--sub); }
  .profile label { margin-right:16px; cursor:pointer; }
  .profile select { border:1px solid var(--line); border-radius:8px; padding:4px 8px; }

  /* 进度页 */
  .stage { display:flex; align-items:center; gap:14px; border:1px solid var(--line);
           border-radius:14px; padding:16px 18px; margin-bottom:12px; }
  .stage .icon { width:34px; height:34px; border-radius:50%; background:var(--green-soft);
                 color:var(--green); display:flex; align-items:center; justify-content:center;
                 font-weight:700; }
  .stage.done .icon { background:var(--green); color:#fff; }
  .stage .name { font-weight:600; font-size:15px; }
  .stage .desc { font-size:12.5px; color:var(--sub); }
  .stage .state { margin-left:auto; font-size:13px; color:var(--sub); }
  .pbar { height:8px; background:#e8eae2; border-radius:99px; overflow:hidden; margin:18px 0 6px; }
  .pbar>div { height:100%; width:0%; background:var(--green-mid); transition:width .4s; }

  /* 结果页组件 */
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:1px solid var(--line);
          border-radius:14px; overflow:hidden; }
  .kpi { padding:18px 20px; border-left:1px solid var(--line); }
  .kpi:first-child { border-left:none; }
  .kpi .lab { font-size:13px; color:var(--sub); margin-bottom:6px; }
  .kpi .val { font-size:26px; font-weight:700; }
  .kpi.warn .val { color:var(--red); }
  .bar-row { margin:14px 0; }
  .bar-row .lab { display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px; }
  .bar { height:10px; background:#eceee6; border-radius:99px; overflow:hidden; }
  .bar>div { height:100%; border-radius:99px; }
  .kv { display:grid; grid-template-columns:1fr 1fr; }
  .kv .cell { padding:14px 10px; border-top:1px solid var(--line); }
  .kv .cell .lab { font-size:12.5px; color:var(--sub); margin-bottom:4px; }
  .kv .cell .val { font-size:14.5px; line-height:1.6; }

  .risk { border:1px solid var(--line); border-radius:14px; margin-bottom:12px; overflow:hidden; }
  .risk .head { display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; }
  .risk .head b { font-size:15px; }
  .risk .head .loc { font-size:12.5px; color:var(--sub); }
  .risk .head .lv { margin-left:auto; }
  .risk .body { display:none; padding:0 18px 16px; }
  .risk.open .body { display:block; }
  .quote { border-left:3px solid var(--green-mid); background:#f7f8f3; padding:10px 14px;
           font-size:13.5px; border-radius:0 10px 10px 0; margin:6px 0 12px; line-height:1.7; }
  .tri { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .tri .col .t { font-size:13px; color:var(--red); font-weight:600; margin-bottom:4px; }
  .tri .col p { margin:0; font-size:13px; color:var(--sub); line-height:1.7; }

  .rec { border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:12px; }
  .rec .action { font-size:15px; font-weight:600; margin-top:8px; line-height:1.6; }
  .rec .why { font-size:13.5px; color:var(--sub); margin-top:6px; line-height:1.7; }
  .rec .meta { font-size:12px; color:#a9b0a6; margin-top:8px; }
  .qgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .q { border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:14px;
       display:flex; gap:10px; }
  .q .dot { color:var(--ok); font-weight:700; }
  .sub-h { font-size:14.5px; font-weight:700; margin:18px 0 8px; color:var(--green); }
  ul { margin:6px 0; padding-left:20px; } li { font-size:13.5px; margin:5px 0; line-height:1.7; }
  .muted { color:var(--sub); font-size:13.5px; }
  .errbox { border:1px solid var(--red); background:var(--red-bg); color:var(--red);
            border-radius:14px; padding:18px; font-size:14px; line-height:1.7; }
  .foot { margin-top:18px; background:#eef0ea; border-radius:14px; padding:16px 20px;
          font-size:13px; color:var(--sub); }
  @media (max-width:820px){ .kpis{grid-template-columns:1fr 1fr;} .tri,.qgrid,.home-grid,.kv{grid-template-columns:1fr;}
    .hero{flex-direction:column;align-items:flex-start;} .hero .side{margin-left:0;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="logo">元</div><b>看得懂的钱</b>
    <span class="tag">合同内容仅用于本次分析，不会保存</span></div>
  <div class="back" id="back" onclick="goHome()">← 重新分析一份合同</div>
  <div id="view"></div>
</div>

<script>
/* ---------------- 状态与视图切换 ---------------- */
const $view = document.getElementById('view');
const $back = document.getElementById('back');
let lastData = null;

function goHome(){ $back.style.display='none'; renderHome(); }

/* ---------------- 视图一：首页 + 上传（说明书 3.5 (1)(2)） ---------------- */
function renderHome(){
  $view.innerHTML = `
  <div class="hero"><div>
    <div class="kicker">消费金融合同体检</div>
    <h1>看得懂的钱</h1>
    <p>上传贷款或分期合同，几分钟内给你一份看得懂的体检报告：真实年化到底多少、有没有坑、签约前该问机构什么问题、签约后要盯住哪些节点。</p>
  </div><div class="side"><div class="lab">判定依据</div><div class="val">52 条规则</div>
    <div class="sub">32 条法规 · 55+ 纠纷案例</div></div></div>

  <div class="section">
    <div class="sec-head"><span class="sec-no">开始</span><h2>上传一份合同开始体检</h2></div>
    <div class="sec-desc">支持 PDF、图片（可拍照）、Word、TXT，也可以直接粘贴合同文字。一次体检一份合同。</div>
    <div class="home-grid">
      <div class="opt"><h3>上传合同文件</h3>
        <p>选择合同的 PDF、照片或文档文件，上传后自动识别文字并进入分析。</p>
        <input type="file" id="fileContract" accept=".txt,.md,.docx,.pdf,.png,.jpg,.jpeg,.webp,.bmp">
        <button class="primary" onclick="startContract()">开始体检</button>
      </div>
      <div class="opt"><h3>粘贴合同文字</h3>
        <p>如果合同是电子版，直接把全文粘贴到下面，效果相同。</p>
        <textarea id="pasteContract" rows="4" placeholder="把合同全文粘贴到这里…"
          style="width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;
                 font-size:13px;font-family:inherit;resize:vertical;margin-bottom:8px"></textarea>
        <button class="primary" onclick="startPaste()">开始体检</button>
      </div>
    </div>
    <div class="profile">选填你的个人情况（仅用于生成更贴合你的建议，不填不影响分析，信息不会保存）：
      <label><input type="checkbox" id="pFirst"> 第一次贷款</label>
      <label><input type="checkbox" id="pDebt"> 已有其他负债</label>
      <label>场景 <select id="pScene"><option value="">通用</option><option value="medical">医美/医疗分期</option>
        <option value="training">培训分期</option><option value="insurance">保险相关</option></select></label>
    </div>
  </div>`;
}

function profile(){
  const p = {};
  if (document.getElementById('pFirst')?.checked) p.firstTimeBorrower = true;
  if (document.getElementById('pDebt')?.checked) p.hasOtherDebts = true;
  const s = document.getElementById('pScene')?.value; if (s) p.scenario = s;
  return Object.keys(p).length ? p : null;
}

function bytesToBase64(buf){
  let bin=''; for(let i=0;i<buf.length;i+=0x8000)
    bin+=String.fromCharCode.apply(null, buf.subarray(i,i+0x8000));
  return btoa(bin);
}

async function startContract(){
  const f=document.getElementById('fileContract').files[0];
  if(!f){ alert('请先选择合同文件'); return; }
  const buf=new Uint8Array(await f.arrayBuffer());
  start({ contractFile:{ name:f.name, base64:bytesToBase64(buf) } });
}

function startPaste(){
  const text=(document.getElementById('pasteContract').value||'').trim();
  if(!text){ alert('请先粘贴合同文字'); return; }
  const buf=new TextEncoder().encode(text);
  start({ contractFile:{ name:'pasted-contract.txt', base64:bytesToBase64(buf) } });
}

/* ---------------- 视图二：分析进度（说明书 7.2.3 / 协议 task-status 阶段） ---------------- */
const STAGES = [
  ['1', '识别合同内容', '读取合同全文，抽取金额、利率、费用等关键条款'],
  ['2', '测算成本与排查风险', '按实际现金流计算真实年化，逐条比对风险规则、法规与同类纠纷案例'],
  ['3', '生成建议与提醒', '形成分级签约建议、问题清单与签约后的行动提醒'],
];
function start(payload){
  payload.profile = profile();
  $back.style.display='block';
  $view.innerHTML = `<div class="section">
    <div class="sec-head"><span class="sec-no">分析中</span><h2>正在为你体检这份合同…</h2></div>
    <div class="sec-desc">已接收合同，正在识别与分析，完成后自动展示报告。</div>
    <div class="pbar"><div id="pb"></div></div>
    <div class="muted" id="pct" style="text-align:right">0%</div>
    ${STAGES.map((s,i)=>`<div class="stage" id="st${i}">
      <div class="icon">${s[0]}</div>
      <div><div class="name">${s[1]}</div><div class="desc">${s[2]}</div></div>
      <div class="state" id="ss${i}">等待中</div></div>`).join('')}
  </div>`;
  const req = fetch('/api/run', {method:'POST', headers:{'Content-Type':'application/json'},
                                 body: JSON.stringify(payload)})
              .then(r=>r.json()).catch(e=>({error:'服务连接失败：'+e}));
  animate(0, req);
}
function animate(step, req){
  const pb=document.getElementById('pb'), pct=document.getElementById('pct');
  if(!pb) return;
  if(step<3){
    document.getElementById('ss'+step).innerText='进行中…';
    pb.style.width=(step*33+15)+'%'; pct.innerText=(step*33+15)+'%';
    setTimeout(()=>{ const st=document.getElementById('st'+step);
      if(!st) return; st.classList.add('done');
      document.getElementById('ss'+step).innerText='完成 ✓';
      animate(step+1, req); }, 700);
  } else {
    pb.style.width='100%'; pct.innerText='100%';
    req.then(res=>setTimeout(()=>renderResult(res), 350));
  }
}
function showError(msg, home){
  $back.style.display='block';
  $view.innerHTML = `<div class="errbox"><b>分析未完成</b><br>${esc(msg)}<br><br>
    <button onclick="goHome()">← 返回重新上传</button></div>`;
}

/* ---------------- 视图三：结果页（①通俗翻译 ②真实成本 ③风险 ④签约建议 + 行动提醒） ---------------- */
const levelMeta = {
  high:{h:'建议暂缓核实', side:'高风险', cls:'c-red'},
  verify:{h:'建议重点核实', side:'需核实', cls:'c-yellow'},
  low:{h:'风险较低', side:'较稳妥', cls:'c-green'},
  insufficient_information:{h:'信息不足', side:'待补充', cls:'c-gray'}};
const lvCls={high:'c-red',medium:'c-yellow',low:'c-green'};
const lvText={high:'高风险',medium:'需关注',low:'低风险'};
const prCls={must:'c-red',should:'c-yellow',optional:'c-green'};
const prText={must:'必须处理',should:'建议处理',optional:'可选'};
const timingText={before_signing:'签约前',during_repayment:'还款期间',when_overdue:'逾期时',
                  anytime:'任何时候',dispute:'发生争议时'};
function esc(s){ const d=document.createElement('div'); d.innerText=s??''; return d.innerHTML; }
function money(v){ return v==null?'—':Number(v).toLocaleString('zh-CN')+'元'; }
function section(no,title,desc,body){
  return `<div class="section"><div class="sec-head"><span class="sec-no">${no}</span>
    <h2>${title}</h2></div><div class="sec-desc">${desc}</div>${body}</div>`;
}

function renderResult(res){
  if(res.error){ showError(res.error); return; }
  const env=res.output;
  if(env.status==='failed'){ showError((env.errors[0]||{}).message||'上游 Agent 运行失败'); return; }
  lastData = res;
  const d=env.data, o=d.overallResult, m=levelMeta[o.level]||levelMeta.verify;
  const cs=(res.b.data||{}).contractSummary||{}, ca=(res.b.data||{}).costAnalysis||{};
  const risks=(res.c.data||{}).riskItems||[], rs=(res.c.data||{}).riskSummary||{high:0,medium:0,low:0};
  const plan=res.actionPlan;

  let html = `<div class="hero"><div>
      <div class="kicker">合同体检报告 · 签约建议</div><h1>${m.h}</h1>
      <p>${esc(o.summary)}</p></div>
    <div class="side"><div class="lab">总体判定</div><div class="val">${m.side}</div>
      <div class="sub">${env.status==='partial'?'部分信息缺失，结论谨慎参考':'风险 高'+rs.high+' / 中'+rs.medium+' / 低'+rs.low}</div></div></div>`;

  /* 01 四个核心数字 + 名义/真实对比、成本四档判定（说明书 4.2 功能4） */
  const rate = ca.realAnnualRate;
  const rateBand = rate==null ? null
    : rate<=12 ? {color:'var(--ok)',   label:'较低（不超过 4 倍一年期 LPR）'}
    : rate<=20 ? {color:'var(--yellow)',label:'正常偏上（处于消费金融综合成本目标区间）'}
    : rate<=24 ? {color:'#c2571a',      label:'偏高预警（逼近持牌机构 24% 息费红线）'}
    :            {color:'var(--red)',   label:'涉嫌违规（超过持牌机构 24% 息费上限）'};
  const nominal = cs.nominalRate;
  const compareLine = (rate!=null && nominal!=null && nominal>0)
    ? `<div class="muted" style="margin-top:12px">合同写的名义利率是 <b>${nominal}%</b>，
       把服务费等全部费用折算进去后，真实年化约 <b style="color:${rateBand.color}">${rate}%</b>
       （约为名义的 ${(rate/nominal).toFixed(1)} 倍）· ${rateBand.label}</div>` : '';
  html += section('01','四个核心数字','先看你最终拿到多少、总共要还多少。',
    `<div class="kpis">
      <div class="kpi"><div class="lab">实际到账金额</div><div class="val">${money(cs.actualReceivedAmount)}</div></div>
      <div class="kpi"><div class="lab">总还款金额</div><div class="val">${money(ca.totalRepayment)}</div></div>
      <div class="kpi warn"><div class="lab">额外支付成本</div><div class="val">${money(ca.additionalFees)}</div></div>
      <div class="kpi"><div class="lab">真实年化利率</div>
        <div class="val" style="color:${rateBand?rateBand.color:'inherit'}">${rate==null?'—':rate+'%'}</div></div>
    </div>${compareLine}`);

  /* 02 成本构成（B） */
  const base=Math.max(cs.loanAmount||0, 1);
  const bar=(v,color)=>`<div class="bar"><div style="width:${Math.min(100,(v||0)/base*100)}%;background:${color}"></div></div>`;
  html += section('02','成本构成','服务费虽然不叫利息，也会增加你的实际成本。',
    `<div class="bar-row"><div class="lab"><span>借款本金</span><b>${money(cs.loanAmount)}</b></div>${bar(cs.loanAmount,'#4a5a50')}</div>
     <div class="bar-row"><div class="lab"><span>利息</span><b>${money(ca.totalInterest)}</b></div>${bar(ca.totalInterest,'#2e5a4c')}</div>
     <div class="bar-row"><div class="lab"><span>服务费及其他费用</span><b>${money(ca.additionalFees)}</b></div>${bar(ca.additionalFees,'#b08a2e')}</div>`);

  /* 03 合同关键信息（B，结果页①的“放在一处核对”） */
  const cell=(lab,val)=>`<div class="cell"><div class="lab">${lab}</div><div class="val">${esc(val??'—')}</div></div>`;
  html += section('03','合同关键信息','把分散在合同里的信息放在一处核对。',
    `<div class="kv">${cell('借款机构',cs.institution)}${cell('合同类型',cs.productType)}
     ${cell('借款金额',money(cs.loanAmount))}${cell('实际到账金额',money(cs.actualReceivedAmount))}
     ${cell('合同期限',cs.loanTermMonths?cs.loanTermMonths+'个月':'—')}${cell('每期还款',money(cs.monthlyPayment))}
     ${cell('还款方式',cs.repaymentMethod)}${cell('名义费率',cs.nominalRate==null?'—':cs.nominalRate+'%')}
     ${cell('提前还款规则',cs.prepaymentRule)}${cell('逾期费用',cs.overdueFee)}</div>`);

  /* 04 风险评分仪表盘 + 风险条款（原文-通俗解释-建议追问 三栏，红黄绿） */
  let riskHtml = '';
  const score = res.riskScore;
  if (typeof score === 'number') {
    const zone = score<=40 ? {t:'高风险',c:'var(--red)'} : score<=70 ? {t:'中风险',c:'var(--yellow)'} : {t:'低风险',c:'var(--ok)'};
    riskHtml += `<div style="display:flex;align-items:center;gap:22px;margin-bottom:20px;
        border:1px solid var(--line);border-radius:14px;padding:16px 20px">
      <div style="text-align:center;min-width:90px">
        <div style="font-size:34px;font-weight:700;color:${zone.c}">${score}</div>
        <div style="font-size:12.5px;color:var(--sub)">风险评分（满分 100）</div></div>
      <div style="flex:1">
        <div style="position:relative;height:12px;border-radius:99px;overflow:hidden;
             background:linear-gradient(to right,var(--red) 0 40%,#d9a514 40% 70%,var(--ok) 70% 100%)">
          <div style="position:absolute;left:${score}%;top:0;bottom:0;width:3px;background:var(--ink);
               transform:translateX(-50%)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:6px">
          <span>0–40 高风险</span><span>41–70 中风险</span><span>71–100 低风险</span></div>
        <div style="font-size:13.5px;margin-top:6px">得分越低风险越高，当前等级：<b style="color:${zone.c}">${zone.t}</b>
          （满分 100，按命中风险条款的权重扣分）</div></div></div>`;
  }
  riskHtml += `<div style="margin-bottom:14px">
    <span class="chip c-red">高风险 ${rs.high}</span> <span class="chip c-yellow">需关注 ${rs.medium}</span>
    <span class="chip c-green">低风险 ${rs.low}</span></div>`;
  for(const r of risks){
    const ev=(r.evidence&&r.evidence[0])||{};
    const loc=(ev.location&&(ev.location.section||('第'+ev.location.page+'页')))||'';
    riskHtml += `<div class="risk"><div class="head" onclick="this.parentNode.classList.toggle('open')">
        <b>${esc(r.title)}</b><span class="loc">${esc(loc)}</span>
        <span class="lv chip ${lvCls[r.riskLevel]||'c-gray'}">${lvText[r.riskLevel]||r.riskLevel}</span></div>
      <div class="body">
        ${ev.quote?`<div class="sub-h" style="margin-top:0">合同原文</div><div class="quote">${esc(ev.quote)}</div>`:''}
        <div class="tri">
          <div class="col"><div class="t">通俗解释</div><p>${esc((r.reason||'').split('。')[0])}。</p></div>
          <div class="col"><div class="t">可能后果</div><p>${esc(r.possibleConsequence||'')}</p></div>
          <div class="col"><div class="t">建议确认</div><p>${esc(r.questionToAsk||'')}</p></div>
        </div>
        ${(r.matchedCases&&r.matchedCases.length)?`<div class="muted" style="margin-top:10px">知识库匹配到 ${r.matchedCases.length} 起同类纠纷案例</div>`:''}
      </div></div>`;
  }
  if(!risks.length) riskHtml += '<div class="muted">未识别出明显风险条款。</div>';
  html += section('04','风险条款','点击每一项，查看合同原文、通俗解释和建议向机构确认的问题。',riskHtml);

  /* 05 签约建议（按优先级排序，红黄绿） */
  const riskTitle = {};
  for(const r of risks) riskTitle[r.id]=r.title;
  let recHtml='';
  for(const r of d.recommendations){
    const related = r.relatedRiskIds.map(id=>riskTitle[id]).filter(Boolean);
    recHtml += `<div class="rec"><div>
        <span class="chip ${prCls[r.priority]}">${prText[r.priority]}</span>
        <span class="chip c-gray">${timingText[r.timing]||r.timing}</span></div>
      <div class="action">${esc(r.action)}</div>
      <div class="why">为什么：${esc(r.rationale)}</div>
      ${related.length?`<div class="meta">对应风险条款：${related.map(esc).join('；')}</div>`:''}</div>`;
  }
  html += section('05','签约建议（按优先级排序）',
    '红＝必须处理，黄＝建议处理，绿＝可选；每条建议都对应上方的风险条款。',
    recHtml||'<div class="muted">无建议。</div>');

  /* 06 问题清单（D） */
  html += section('06','签约前问题清单','带着这些问题去确认，答案要尽量留在书面材料里。',
    d.questionList.length
      ? `<div class="qgrid">${d.questionList.map(q=>`<div class="q"><span class="dot">✓</span>${esc(q)}</div>`).join('')}</div>`
      : '<div class="muted">无需额外提问。</div>');

  /* 07 行动提醒（D 行动管理扩展） */
  if(plan){
    let body='<div class="sub-h" style="margin-top:0">提醒任务</div>'+(plan.reminders.length
      ? '<ul>'+plan.reminders.map(r=>`<li><b>${esc(r.title)}</b>：${esc(r.rule)}</li>`).join('')+'</ul>'
      : '<div class="muted">无提醒任务。</div>');
    body+='<div class="sub-h">证据保存清单</div><ul>'+plan.evidenceChecklist.map(x=>`<li>${esc(x)}</li>`).join('')+'</ul>';
    if(plan.communicationScripts.length)
      body+='<div class="sub-h">沟通话术</div><ul>'+plan.communicationScripts.map(s=>`<li>【${esc(s.scenario)}】${esc(s.script)}</li>`).join('')+'</ul>';
    body+='<div class="sub-h">后续跟进计划</div><ul>'+plan.followUpPlan.map(st=>`<li><b>${timingText[st.stage]||st.stage}</b>：${st.steps.map(esc).join('；')}</li>`).join('')+'</ul>';
    html += section('07','行动提醒（签约后全流程）',
      '把建议转化为可跟进的任务，覆盖还款、退费、逾期与维权节点。',body);
  }

  html += `<div class="foot">免责声明：${esc(d.disclaimer)} · 报告编号 ${esc(env.taskId)}
    ${env.status==='partial'?' · ⚠ 合同部分信息未能识别，本报告基于已识别内容生成，结论请谨慎参考':''}</div>`;
  $view.innerHTML = html;
  window.scrollTo(0,0);
}

renderHome();
</script>
</body>
</html>
